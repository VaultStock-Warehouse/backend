version: "3.9"

# ============================================================
# Backend + PostgreSQL + Frontend (full local stack)
# Usage: docker-compose -f docker-compose-backend-local.yml up --build
# ============================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: warehouse-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-warehouse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warehouse_pass}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warehouse_user} -d ${POSTGRES_DB:-warehouse_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Backend ───────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: warehouse-backend
    container_name: warehouse-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-warehouse_user}:${POSTGRES_PASSWORD:-warehouse_pass}@postgres:5432/${POSTGRES_DB:-warehouse_db}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_HOST: postgres
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-warehouse_user}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  postgres_data:
    name: warehouse_postgres_data
  uploads_data:
    name: warehouse_uploads_data
